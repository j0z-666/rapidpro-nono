server {
    listen      80;
    server_name localhost;
    client_max_body_size 50M;
    access_log  off;
    resolver    127.0.0.11;

    set $rapid "rapidpro:8000";
    set $courier "courier:8080";
    set $mailroom "mailroom:8090";

    location / {
        proxy_pass         http://$rapid;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location /static/ {
        alias /rapidpro/sitestatic/;
        access_log off;
        expires 30d;
    }
    
    location ^~ /c/ {
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $http_host;
        proxy_pass http://$courier;
        break;
    }

    location ^~ /mr/ {
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $http_host;
        proxy_pass http://$mailroom;
        break;
    }

    location /media/ {
        rewrite ^/media/(.*)$ /temba-default/$1 break;

        proxy_pass http://minio:9000;

        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect off;
    }

    location /temba-attachments/ {
        resolver 127.0.0.11;

        set $minio_upstream minio:9000;

        proxy_pass http://$minio_upstream/temba-attachments/;

        proxy_set_header Host minio;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /static/ {
        alias /rapidpro/sitestatic/;
        access_log off;
        expires 30d;
    }
}

server {
    listen 443 ssl;
    server_name courier.internal;

    ssl_certificate /etc/nginx/certs/courier.crt;
    ssl_certificate_key /etc/nginx/certs/courier.key;

    resolver 127.0.0.11;

    set $courier_upstream courier:8080;

    location / {
        proxy_pass http://$courier_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}