server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;
    access_log off;

    resolver 127.0.0.11;

    # upstreams
    set $rapid rapidpro:8000;
    set $courier courier:8080;
    set $mailroom mailroom:8090;

    # =========================
    # RapidPro (Django)
    # =========================
    location / {
        proxy_pass http://$rapid;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # =========================
    # Static files
    # =========================
    location /static/ {
        alias /rapidpro/sitestatic/;
        access_log off;
        expires 30d;
    }

    # =========================
    # Mailroom (/mr/)
    # =========================
    location ^~ /mr/ {
        proxy_pass http://mailroom:8090/;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # =========================
    # Courier (/c/)
    # =========================
    location ^~ /c/ {
        proxy_pass http://courier:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # =========================
    # Media (default bucket)
    # =========================
    location /media/ {
        rewrite ^/media/(.*)$ /temba-default/$1 break;

        proxy_pass http://minio:9000;

        proxy_set_header Host minio;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect off;
    }

    # =========================
    # Attachments (public)
    # =========================
    location /temba-attachments/ {
        proxy_pass http://minio:9000/temba-attachments/;

        proxy_set_header Host minio;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# =========================================
# HTTPS interno para courier (mailroom -> courier)
# =========================================
server {
    listen 443 ssl;
    server_name courier.internal;

    ssl_certificate /etc/nginx/certs/courier.crt;
    ssl_certificate_key /etc/nginx/certs/courier.key;

    resolver 127.0.0.11;

    location / {
        proxy_pass http://courier:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}