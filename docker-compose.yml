name: rapidpro
services:
  nginx:
    image: nginx
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
    # ports:
    #   - 80:80
    mem_limit: 256m
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    volumes:
      - ./postgres/init_dbs.sql:/docker-entrypoint-initdb.d/dev_dbs.sql
      - postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: tembatemba
      POSTGRES_USER: temba
      POSTGRES_DB: temba
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temba"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  elastic:
    image: elasticsearch:8.14.0
    volumes:
      - elastic:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ingest.geoip.downloader.enabled: false
      logger.level: INFO
      ES_JAVA_OPTS: -Xms2g -Xmx2g
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8.0-alpine
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey:/data
    ports:
      - 6379:6379
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 2s
    restart: unless-stopped

  rapidpro:
    build:
      context: ./rapidpro/
      args:
        - RAPIDPRO_TAG=v26.0.0
    command: ["webapp"]
    depends_on:
      postgres:
        condition: service_healthy
      elastic:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql://temba:tembatemba@postgres:5432/temba
      REDIS_URL: redis://valkey:6379/0
      ELASTICSEARCH_URL: http://elastic:9200
      MAILROOM_URL: http://mailroom:8090
      MAILROOM_AUTH_TOKEN: topsecret
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-supersecretkey123}
      # Deshabilitar DynamoDB/S3
      USE_DYNAMO: "false"
      USE_S3: "false"
      # Configuración SMTP - AGREGAR ESTO
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-webmaster@localhost}
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  celery:
    build:
      context: ./rapidpro/
      args:
        - RAPIDPRO_TAG=v26.0.0
    command: ["celery"]
    depends_on:
      rapidpro:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://temba:tembatemba@postgres:5432/temba
      REDIS_URL: redis://valkey:6379/0
      ELASTICSEARCH_URL: http://elastic:9200
      MAILROOM_URL: http://mailroom:8090
      MAILROOM_AUTH_TOKEN: topsecret
      # Deshabilitar DynamoDB/S3
      USE_DYNAMO: "false"
      USE_S3: "false"
    mem_limit: 1g
    restart: unless-stopped

  mailroom:
    build:
      context: https://github.com/nyaruka/mailroom.git#v26.0.0
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - 8090:8090
    environment:
      MAILROOM_ADDRESS: 0.0.0.0
      MAILROOM_DB: postgres://temba:tembatemba@postgres:5432/temba?sslmode=disable
      MAILROOM_VALKEY: valkey://valkey:6379/15
      MAILROOM_ELASTIC: http://elastic:9200
      MAILROOM_DOMAIN: ${MAILROOM_DOMAIN:-localhost}
      MAILROOM_ATTACHMENT_DOMAIN: ${MAILROOM_ATTACHMENT_DOMAIN:-localhost}
      MAILROOM_AUTH_TOKEN: topsecret
      MAILROOM_LOG_LEVEL: info
    mem_limit: 512m
    restart: unless-stopped

  courier:
    build:
      context: https://github.com/nyaruka/courier.git#v26.0.1
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      COURIER_ADDRESS: 0.0.0.0
      COURIER_DB: postgres://temba:tembatemba@postgres:5432/temba?sslmode=disable
      COURIER_VALKEY: valkey://valkey:6379/15
      COURIER_DOMAIN: ${COURIER_DOMAIN:-localhost}
      COURIER_BASE_URL: ${COURIER_BASE_URL:-http://localhost}
      COURIER_AUTH_TOKEN: topsecret
      COURIER_LOG_LEVEL: info
    mem_limit: 512m
    restart: unless-stopped

  indexer:
    build:
      context: https://github.com/nyaruka/rp-indexer.git#v26.0.1
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      elastic:
        condition: service_healthy
    environment:
      INDEXER_DB: postgres://temba:tembatemba@postgres:5432/temba?sslmode=disable
      INDEXER_ELASTIC_URL: http://elastic:9200
      INDEXER_LOG_LEVEL: info
    mem_limit: 512m
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres:
    driver: local
  elastic:
    driver: local
  valkey:
    driver: local
  caddy_data:    
    driver: local
  caddy_config:  
    driver: local